<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Büroraum -->
  <rect x="0" y="0" width="800" height="600" fill="#F3F1EC"/>
  <rect x="0" y="0" width="800" height="380" fill="#EDEAE3"/>
  <!-- Fenster -->
  <rect x="580" y="50" width="180" height="220" rx="6" fill="#BFE3F5" stroke="#C9C2B4" stroke-width="8"/>
  <line x1="670" y1="50" x2="670" y2="270" stroke="#C9C2B4" stroke-width="6"/>
  <!-- Uhr -->
  <circle cx="120" cy="90" r="34" fill="#FFFFFF" stroke="#8A8370" stroke-width="5"/>
  <line x1="120" y1="90" x2="120" y2="68" stroke="#3A3A3A" stroke-width="4" stroke-linecap="round"/>
  <line x1="120" y1="90" x2="136" y2="96" stroke="#3A3A3A" stroke-width="4" stroke-linecap="round"/>
  <!-- Boden -->
  <rect x="0" y="380" width="800" height="220" fill="#D9D3C4"/>
  <!-- Tisch -->
  <ellipse cx="400" cy="470" rx="260" ry="70" fill="#B08B5A"/>
  <ellipse cx="400" cy="460" rx="260" ry="70" fill="#C29B68"/>
  <!-- Laptop -->
  <g transform="translate(330,435)">
    <rect x="-30" y="0" width="60" height="8" fill="#5A5A5A"/>
    <rect x="-28" y="-34" width="56" height="34" rx="3" fill="#3A3A3A"/>
    <rect x="-24" y="-30" width="48" height="26" fill="#7FB6E0"/>
  </g>
  <!-- Papiere -->
  <g transform="translate(470,445)">
    <rect x="-24" y="-4" width="50" height="34" rx="3" fill="#FFFFFF" stroke="#D6CDBB" stroke-width="2" transform="rotate(-6)"/>
    <rect x="-18" y="0" width="50" height="34" rx="3" fill="#FDFDFD" stroke="#D6CDBB" stroke-width="2" transform="rotate(4)"/>
  </g>
  <!-- Aufgeregter Mann, steht, Arme hoch -->
  <g transform="translate(400,300)">
    <line x1="-24" y1="-10" x2="-52" y2="-55" stroke="#3D3D3D" stroke-width="10" stroke-linecap="round"/>
    <line x1="24" y1="-10" x2="52" y2="-55" stroke="#3D3D3D" stroke-width="10" stroke-linecap="round"/>
    <rect x="-30" y="-60" width="60" height="90" rx="16" fill="#3D5A80"/>
    <rect x="-14" y="30" width="12" height="70" fill="#2E3A46"/>
    <rect x="2" y="30" width="12" height="70" fill="#2E3A46"/>
    <circle cx="0" cy="-84" r="26" fill="#F1C6A0"/>
    <!-- aufgeregte Augenbrauen und offener Mund -->
    <line x1="-13" y1="-92" x2="-3" y2="-88" stroke="#5A3A24" stroke-width="3" stroke-linecap="round"/>
    <line x1="13" y1="-92" x2="3" y2="-88" stroke="#5A3A24" stroke-width="3" stroke-linecap="round"/>
    <ellipse cx="0" cy="-76" rx="8" ry="10" fill="#7A3B2E"/>
  </g>
  <!-- Kollegin 1, sitzt, schaut überrascht -->
  <g transform="translate(230,420)">
    <rect x="-26" y="-60" width="52" height="80" rx="15" fill="#B95C5C"/>
    <circle cx="0" cy="-78" r="22" fill="#8A5A3A"/>
    <circle cx="-8" cy="-80" r="3" fill="#2B2B2B"/>
    <circle cx="8" cy="-80" r="3" fill="#2B2B2B"/>
  </g>
  <!-- Kollege 2, sitzt, hält den Kopf -->
  <g transform="translate(560,425)">
    <rect x="-26" y="-58" width="52" height="78" rx="15" fill="#4C8C6B"/>
    <circle cx="0" cy="-76" r="22" fill="#F1C6A0"/>
    <line x1="-18" y1="-90" x2="-4" y2="-80" stroke="#4C8C6B" stroke-width="9" stroke-linecap="round"/>
  </g>
  <!-- Sprechblase mit Ausrufezeichen über dem aufgeregten Mann -->
  <g transform="translate(455,175)">
    <ellipse cx="0" cy="0" rx="34" ry="26" fill="#FFFFFF" stroke="#C9C2B4" stroke-width="3"/>
    <polygon points="-14,20 -2,20 -18,38" fill="#FFFFFF" stroke="#C9C2B4" stroke-width="3"/>
    <text x="0" y="9" font-size="30" font-family="sans-serif" font-weight="bold" fill="#D3462F" text-anchor="middle">!</text>
  </g>
</svg>
