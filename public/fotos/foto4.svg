<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Himmel -->
  <rect x="0" y="0" width="800" height="420" fill="#BFE3F5"/>
  <circle cx="700" cy="80" r="45" fill="#FFE38C"/>
  <!-- Wolken -->
  <g fill="#FFFFFF" opacity="0.9">
    <ellipse cx="140" cy="90" rx="55" ry="24"/>
    <ellipse cx="185" cy="80" rx="40" ry="20"/>
    <ellipse cx="420" cy="60" rx="45" ry="18"/>
    <ellipse cx="460" cy="70" rx="32" ry="15"/>
  </g>
  <!-- Bäume -->
  <g>
    <rect x="50" y="300" width="18" height="90" fill="#8D6E4B"/>
    <circle cx="59" cy="280" r="55" fill="#5FA85B"/>
    <rect x="720" y="290" width="18" height="100" fill="#8D6E4B"/>
    <circle cx="729" cy="265" r="60" fill="#4E9B4E"/>
  </g>
  <!-- Rasen -->
  <rect x="0" y="400" width="800" height="200" fill="#7FBF5C"/>
  <rect x="0" y="400" width="800" height="10" fill="#6FAE4D"/>
  <!-- Mittellinie -->
  <line x1="400" y1="410" x2="400" y2="600" stroke="#FFFFFF" stroke-width="4" opacity="0.7"/>
  <circle cx="400" cy="500" r="55" fill="none" stroke="#FFFFFF" stroke-width="4" opacity="0.7"/>
  <!-- Tor links -->
  <g stroke="#FFFFFF" stroke-width="6" fill="none">
    <rect x="30" y="430" width="90" height="80"/>
    <line x1="30" y1="430" x2="10" y2="450"/>
    <line x1="120" y1="430" x2="140" y2="450"/>
  </g>
  <!-- Tor rechts -->
  <g stroke="#FFFFFF" stroke-width="6" fill="none">
    <rect x="680" y="420" width="90" height="80"/>
    <line x1="680" y1="420" x2="660" y2="440"/>
    <line x1="770" y1="420" x2="790" y2="440"/>
  </g>
  <!-- Bank -->
  <g fill="#8D6E4B">
    <rect x="600" y="360" width="90" height="10"/>
    <rect x="608" y="345" width="74" height="8"/>
    <rect x="605" y="370" width="8" height="20"/>
    <rect x="677" y="370" width="8" height="20"/>
  </g>
  <!-- Ball -->
  <g transform="translate(430,480)">
    <circle r="18" fill="#FFFFFF" stroke="#2B2B2B" stroke-width="2"/>
    <polygon points="0,-8 7,-2 4,7 -4,7 -7,-2" fill="#2B2B2B"/>
  </g>
  <!-- Kind 1: rotes Trikot, rennt zum Ball -->
  <g transform="translate(370,470)">
    <line x1="0" y1="30" x2="-14" y2="70" stroke="#3A3A3A" stroke-width="7" stroke-linecap="round"/>
    <line x1="0" y1="30" x2="16" y2="66" stroke="#3A3A3A" stroke-width="7" stroke-linecap="round"/>
    <rect x="-14" y="0" width="28" height="34" rx="10" fill="#E24A4A"/>
    <line x1="-13" y1="8" x2="-28" y2="-4" stroke="#E24A4A" stroke-width="7" stroke-linecap="round"/>
    <line x1="13" y1="8" x2="26" y2="18" stroke="#E24A4A" stroke-width="7" stroke-linecap="round"/>
    <circle cx="0" cy="-14" r="15" fill="#F1C6A0"/>
  </g>
  <!-- Kind 2: blaues Trikot -->
  <g transform="translate(500,460)">
    <line x1="0" y1="30" x2="-18" y2="64" stroke="#3A3A3A" stroke-width="7" stroke-linecap="round"/>
    <line x1="0" y1="30" x2="12" y2="70" stroke="#3A3A3A" stroke-width="7" stroke-linecap="round"/>
    <rect x="-14" y="0" width="28" height="34" rx="10" fill="#3D7DCB"/>
    <line x1="-13" y1="8" x2="-30" y2="10" stroke="#3D7DCB" stroke-width="7" stroke-linecap="round"/>
    <line x1="13" y1="8" x2="30" y2="-6" stroke="#3D7DCB" stroke-width="7" stroke-linecap="round"/>
    <circle cx="0" cy="-14" r="15" fill="#8A5A3A"/>
  </g>
  <!-- Kind 3: gelbes Trikot, weiter hinten -->
  <g transform="translate(300,520) scale(0.85)">
    <line x1="0" y1="30" x2="-14" y2="66" stroke="#3A3A3A" stroke-width="7" stroke-linecap="round"/>
    <line x1="0" y1="30" x2="16" y2="64" stroke="#3A3A3A" stroke-width="7" stroke-linecap="round"/>
    <rect x="-14" y="0" width="28" height="34" rx="10" fill="#F4C430"/>
    <line x1="-13" y1="8" x2="-28" y2="-2" stroke="#F4C430" stroke-width="7" stroke-linecap="round"/>
    <line x1="13" y1="8" x2="28" y2="4" stroke="#F4C430" stroke-width="7" stroke-linecap="round"/>
    <circle cx="0" cy="-14" r="15" fill="#F1C6A0"/>
  </g>
  <!-- Kind 4: grünes Trikot, Torwart -->
  <g transform="translate(650,470) scale(0.9)">
    <line x1="0" y1="30" x2="-14" y2="64" stroke="#3A3A3A" stroke-width="7" stroke-linecap="round"/>
    <line x1="0" y1="30" x2="14" y2="64" stroke="#3A3A3A" stroke-width="7" stroke-linecap="round"/>
    <rect x="-14" y="0" width="28" height="34" rx="10" fill="#3FA34D"/>
    <line x1="-13" y1="8" x2="-30" y2="-10" stroke="#3FA34D" stroke-width="7" stroke-linecap="round"/>
    <line x1="13" y1="8" x2="30" y2="-10" stroke="#3FA34D" stroke-width="7" stroke-linecap="round"/>
    <circle cx="0" cy="-14" r="15" fill="#8A5A3A"/>
  </g>
</svg>
